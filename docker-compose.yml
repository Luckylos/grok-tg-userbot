services:
  grok-tg-userbot:
    build: .
    container_name: grok-tg-userbot
    restart: unless-stopped
    env_file: .env
    networks:
      - grok2api_default
    volumes:
      - ./data:/app/data
      - ./session:/app/session
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  grok2api_default:
    external: true