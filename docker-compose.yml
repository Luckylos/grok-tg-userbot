services:
  grok-tg-bot:
    build: .
    container_name: grok-tg-bot
    restart: unless-stopped
    env_file: .env
    networks:
      - grok2api_default
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  grok2api_default:
    external: true
